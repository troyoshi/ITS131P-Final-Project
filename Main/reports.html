<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports | CDRC System</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .card { background: rgba(255, 255, 255, 0.92) !important; backdrop-filter: blur(6px); }
    </style>
</head>

<body>

    <header>
        <nav>
            <a href="#" class="logo">CDRC Portal</a>
        </nav>
    </header>

    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <a href="dashboard.html">Dashboard</a>
            <a href="beneficiaries.html">Beneficiaries</a>
            <a href="inventory.html">Inventory</a>
            <a href="distribution.html">Distribution</a>
            <a href="evacuation.html">Evacuation</a>
            <a href="reports.html" style="background-color: rgba(255, 255, 255, 0.2); font-weight: bold;">Reports</a>
            <a href="index.html" style="margin-top: 3rem; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 1.5rem;">Logout</a>
        </aside>

        <div class="main-content" style="background: url('images/sidebar.png') center/cover no-repeat fixed;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
                <h2 style="color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.6);">Analytics & Reports</h2>
            </div>

            <div class="grid-3">
                <div class="card" style="text-align: center;">
                    <h4 style="color: #555;">Dispatched This Month</h4>
                    <p style="font-size: 2rem; font-weight: bold; color: var(--primary-color); margin: 0.5rem 0;">2,450 Packs</p>
                    <a href="#" style="font-size: 0.85rem; color: var(--secondary-color); text-decoration: none; font-weight: 500;">Export Logs →</a>
                </div>
                <div class="card" style="text-align: center;">
                    <h4 style="color: #555;">Sheltered Individuals</h4>
                    <p style="font-size: 2rem; font-weight: bold; color: #28a745; margin: 0.5rem 0;">512 Persons</p>
                    <a href="#" style="font-size: 0.85rem; color: var(--secondary-color); text-decoration: none; font-weight: 500;">Export Manifest →</a>
                </div>
                <div class="card" style="text-align: center;">
                    <h4 style="color: #555;">System Audits</h4>
                    <p style="font-size: 2rem; font-weight: bold; color: var(--text-color); margin: 0.5rem 0;">18 Clear</p>
                    <a href="#" style="font-size: 0.85rem; color: var(--secondary-color); text-decoration: none; font-weight: 500;">View Integrity Logs →</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
