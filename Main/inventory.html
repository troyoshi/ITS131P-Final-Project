<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory | CDRC System</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .card { background: rgba(255, 255, 255, 0.92) !important; backdrop-filter: blur(6px); }
        th, td { padding: 0.75rem !important; border-bottom: 1px solid var(--border-color); }
        th { background-color: rgba(0, 0, 0, 0.04); font-weight: 600; }
        .status-badge { padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.85rem; font-weight: 600; display: inline-block; }
        .status-badge.instock { background-color: #d4edda; color: #155724; }
        .status-badge.low { background-color: #fff3cd; color: #856404; }
    </style>
</head>

<body>

    <header>
        <nav>
            <a href="#" class="logo">CDRC Portal</a>
        </nav>
    </header>

    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <a href="dashboard.html">Dashboard</a>
            <a href="beneficiaries.html">Beneficiaries</a>
            <a href="inventory.html" style="background-color: rgba(255, 255, 255, 0.2); font-weight: bold;">Inventory</a>
            <a href="distribution.html">Distribution</a>
            <a href="evacuation.html">Evacuation</a>
            <a href="reports.html">Reports</a>
            <a href="index.html" style="margin-top: 3rem; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 1.5rem;">Logout</a>
        </aside>

        <div class="main-content" style="background: url('images/sidebar.png') center/cover no-repeat fixed;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
                <h2 style="color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.6);">Stock & Supplies</h2>
                <a href="#" class="btn-primary" style="padding: 0.5rem 1rem; font-size: 0.9rem; box-shadow: 0 4px 6px rgba(0,0,0,0.2);">+ Add Stock Item</a>
            </div>

            <div class="card">
                <h3>Current Stock Breakdown</h3>
                <table style="width:100%; border-collapse:collapse; margin-top:1rem;">
                    <thead>
                        <tr>
                            <th style="text-align:left;">Item Name</th>
                            <th style="text-align:left;">Category</th>
                            <th style="text-align:left;">Quantity</th>
                            <th style="text-align:left;">Unit</th>
                            <th style="text-align:left;">Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Standard Food Packs</td>
                            <td>Food Supplies</td>
                            <td>850</td>
                            <td>Boxes</td>
                            <td><span class="status-badge instock">In Stock</span></td>
                        </tr>
                        <tr>
                            <td>Bottled Mineral Water</td>
                            <td>Beverages</td>
                            <td>120</td>
                            <td>Cases</td>
                            <td><span class="status-badge low">Low Stock</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</body>
</html>
