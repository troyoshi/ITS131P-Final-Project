<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CDRC System</title>
    <link rel="stylesheet" href="/Main/css/style.css">
</head>

<body style="display: flex; align-items: center; justify-content: center; height: 100vh;">

    <div class="card" style="width: 100%; max-width: 400px;">
        <h2 style="text-align: center; margin-bottom: 1.5rem; color: var(--primary-color);">CDRC System Login</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>Username / Email</label>
                <input type="text" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Role</label>
                <select class="form-control">
                    <option>Admin</option>
                    <option>Staff</option>
                    <option>Volunteer</option>
                </select>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">Login to Dashboard</button>
        </form>
        <p style="text-align: center; margin-top: 1rem;"><a href="index.html">Return to Homepage</a></p>
    </div>

    <script src="js/script.js"></script>
</body>

</html>
