<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distribution | CDRC System</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .card { background: rgba(255, 255, 255, 0.92) !important; backdrop-filter: blur(6px); }
    </style>
</head>

<body>

    <header>
        <nav>
            <a href="#" class="logo">CDRC Portal</a>
        </nav>
    </header>

    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <a href="dashboard.html">Dashboard</a>
            <a href="beneficiaries.html">Beneficiaries</a>
            <a href="inventory.html">Inventory</a>
            <a href="distribution.html" style="background-color: rgba(255, 255, 255, 0.2); font-weight: bold;">Distribution</a>
            <a href="evacuation.html">Evacuation</a>
            <a href="reports.html">Reports</a>
            <a href="index.html" style="margin-top: 3rem; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 1.5rem;">Logout</a>
        </aside>

        <div class="main-content" style="background: url('images/sidebar.png') center/cover no-repeat fixed;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
                <h2 style="color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.6);">Log Dispatches</h2>
            </div>

            <div class="card">
                <h3 style="margin-bottom: 1.5rem;">Create Distribution Deployment</h3>
                <form action="#">
                    <div class="grid-2">
                        <div class="form-group">
                            <label>Target Dispatch Location</label>
                            <input type="text" class="form-control" placeholder="e.g. Barangay Hall Canopy">
                        </div>
                        <div class="form-group">
                            <label>Assigned Relief Item</label>
                            <input type="text" class="form-control" placeholder="e.g. Food Packs">
                        </div>
                    </div>
                    <div class="grid-2" style="margin-top: 1rem;">
                        <div class="form-group">
                            <label>Quantity Batch Size</label>
                            <input type="number" class="form-control" placeholder="0">
                        </div>
                        <div class="form-group">
                            <label>Team Leader Name</label>
                            <input type="text" class="form-control" placeholder="In-charge Personnel">
                        </div>
                    </div>
                    <div style="margin-top: 2rem; text-align: right;">
                        <button type="submit" class="btn-primary" style="border: none; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.2);">Initiate Distribution</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
