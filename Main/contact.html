<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | CDRC Tracking System</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <nav>
            <a href="index.html" class="logo">CDRC Tracking System</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="features.html">Features</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="login.html" class="btn-login">Login</a></li>
            </ul>
        </nav>
    </header>

    <main class="container grid-2">
        <div class="card">
            <h2>Get in Touch</h2>
            <p>For inquiries regarding the disaster relief system, please contact the administration.</p>
            <br>
            <p><strong>Email:</strong> admin@cdrc.com</p>
            <p><strong>Phone:</strong> (+63) 992-724-5258</p>
            <p><strong>Address:</strong> Makati City, Metro Manila, Philippines</p>
        </div>
        <div class="card">
            <h2>Send a Message</h2>
            <form>
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea class="form-control" rows="4" required></textarea>
                </div>
                <button type="submit" class="btn-primary">Submit</button>
            </form>
        </div>
    </main>
    <script src="js/script.js"></script>
</body>

</html>
